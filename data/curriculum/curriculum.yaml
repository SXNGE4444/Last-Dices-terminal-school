assignments:
  - id: a-y1-linux-001
    lesson_id: y1-linux-001
    title: Build a secure Linux baseline checklist
    prompt: Create a defensive baseline checklist for a Kali Linux student workstation.
    rubric:
      - Access control hardening
      - Logging and monitoring setup
      - Backup and recovery steps
  - id: a-y3-logi-201
    lesson_id: y3-logi-201
    title: Warehouse ransomware tabletop
    prompt: Draft a defensive response plan for ransomware in a warehouse control network.
    rubric:
      - Containment actions
      - Evidence handling
      - Business continuity for logistics flow
  - id: a-y3-supply-203
    lesson_id: y3-supply-203
    title: Supplier trust defense report
    prompt: Write a supplier assurance workflow for software integrity and vendor access.
    rubric:
      - Verification checkpoints
      - Access review controls
      - Incident escalation steps

quizzes:
  - id: q-y1-net-002
    lesson_id: y1-net-002
    title: Networking fundamentals checkpoint
    questions:
      - question: Which control best limits lateral movement in a warehouse network?
        choices: ["Flat network", "Network segmentation", "Shared admin account", "Open SMB shares"]
        answer_index: 1
      - question: Which log source helps detect supplier phishing attempts?
        choices: ["DNS logs", "Monitor brightness settings", "Wallpaper file metadata", "Printer ink levels"]
        answer_index: 0
  - id: q-y2-ai-120
    lesson_id: y2-ai-120
    title: AI systems architecture checkpoint
    questions:
      - question: What improves trust in AI outputs for operations?
        choices: ["No logging", "Evaluation metrics + monitoring", "Hidden prompts only", "Ignore feedback loops"]
        answer_index: 1
      - question: Which is safest for local-first model workflows?
        choices: ["Unvalidated inputs", "Role-free execution", "Input validation and audit trails", "Shared root account"]
        answer_index: 2
