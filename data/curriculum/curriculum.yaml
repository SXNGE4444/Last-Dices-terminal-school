goals:
  - id: g-weekly-01
    scope: weekly
    title: Complete 5 lessons
    target_value: 5
  - id: g-weekly-02
    scope: weekly
    title: Submit 2 assignments
    target_value: 2
  - id: g-weekly-03
    scope: weekly
    title: Pass 1 quiz set
    target_value: 1
