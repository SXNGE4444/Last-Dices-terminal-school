lessons:
  - id: y1-linux-001
    year: 1
    track: Linux foundations
    title: Linux command line survival
    objective: Navigate, inspect files, manage permissions, and secure shell basics.
    estimated_minutes: 75
  - id: y1-net-002
    year: 1
    track: Networking
    title: Network fundamentals for defenders
    objective: Understand ports, protocols, segmentation, and traffic visibility.
    estimated_minutes: 90
  - id: y1-cyber-003
    year: 1
    track: Cybersecurity foundations
    title: Blue-team threat thinking
    objective: Learn defensive analysis and incident lifecycle basics.
    estimated_minutes: 90
  - id: y2-ai-101
    year: 2
    track: AI engineering
    title: Safe AI workflow design
    objective: Build local AI workflows with input validation and audit logging.
    estimated_minutes: 80
  - id: y2-ai-120
    year: 2
    track: AI systems architecture
    title: Model pipelines and observability
    objective: Design secure AI systems with evaluation and monitoring.
    estimated_minutes: 85
  - id: y3-logi-201
    year: 3
    track: Logistics cybersecurity
    title: Warehouse OT cyber resilience
    objective: Identify logistics OT risks and defensive monitoring patterns.
    estimated_minutes: 95
  - id: y3-mari-202
    year: 3
    track: Maritime cyber awareness
    title: Maritime navigation data integrity
    objective: Assess AIS/GNSS integrity risks and response playbooks.
    estimated_minutes: 100
  - id: y3-supply-203
    year: 3
    track: Supply chain cyber defense
    title: Supplier trust and software provenance
    objective: Defend supply chain workflows using verification and segmentation.
    estimated_minutes: 85

