project_ladder:
  - id: ai-proj-01
    stage: 1
    title: Python SOC helper scripts
    outcome: Operate scripts for parsing alerts and generating incident notes.
  - id: ai-proj-02
    stage: 2
    title: API and data ingestion pipeline
    outcome: Ingest security + logistics signals into local SQLite analytics layer.
  - id: ai-proj-03
    stage: 3
    title: Retrieval assistant for school content
    outcome: Answer curriculum questions with source-backed retrieval.
  - id: ai-proj-04
    stage: 4
    title: Evaluation harness for AI answers
    outcome: Score quality, safety, and policy compliance automatically.
  - id: ai-proj-05
    stage: 5
    title: Multi-agent defensive analyst
    outcome: Coordinate role-based agents for scenario triage.
  - id: ai-proj-06
